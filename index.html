<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Full</title>
    <link rel="stylesheet" href="css/style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="hud" class="hidden">
                <div class="hud-box color-cyan">
                    <div class="hud-label">VELOCIDADE</div>
                    <div class="hud-value"><span id="speed">0</span> <span class="hud-unit">KM/H</span></div>
                </div>
                <div class="hud-box color-magenta">
                    <div class="hud-label">MARCHA</div>
                    <div class="hud-value" id="gear">1</div>
                </div>
                <div class="hud-box color-cyan">
                    <div class="hud-label">POSIÇÃO</div>
                    <div class="hud-value"><span id="position">10</span> <span class="hud-unit">/ 10</span></div>
                </div>
                <div class="hud-box color-magenta">
                    <div class="hud-label">VOLTA</div>
                    <div class="hud-value"><span id="lap">1</span> <span class="hud-unit">/ 3</span></div>
                </div>
            </div>
            <div id="message-overlay" class="hidden"></div>
            
            <div id="menu">
                <h1>SPEED FULL</h1>
                <h2>Selecione seu Chassi Antigravidade</h2>
                <div class="selection-container">
                    <button id="prev-chassis">&lt;</button>
                    <div class="chassis-display">
                        <div id="chassis-name">Neon-X</div>
                        <div id="skin-name">Skin 1 (Padrão)</div>
                    </div>
                    <button id="next-chassis">&gt;</button>
                </div>
                <div class="selection-container">
                    <button id="prev-skin">&lt;</button>
                    <span style="font-size: 20px;">Alternar Skin</span>
                    <button id="next-skin">&gt;</button>
                </div>
                <button id="start-btn">INICIAR CORRIDA</button>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script src="js/track.js?v=3"></script>
    <script src="js/player.js?v=3"></script>
    <script src="js/ai.js?v=3"></script>
    <script src="js/game.js?v=3"></script>
</body>
</html>
